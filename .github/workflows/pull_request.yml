name: pull_request

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: latest
      - name: Install
        run: pnpm install --dangerously-allow-all-builds
      - name: Test
        run: npm test
